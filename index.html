<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGC — Hospital Santa Margarita</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">
        <i class="fa-solid fa-cross"></i>
      </div>
      <h1>Hospital Santa Margarita</h1>
      <p>Sistema de Gestión de Calidad</p>
      <span class="iso-tag">ISO 9001:2015</span>
    </div>

    <!-- Form -->
    <form id="login-form" autocomplete="off">

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope ico-left"></i>
          <input type="email" id="email" placeholder="usuario@stamargarita.mx" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock ico-left"></i>
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="btn-eye" id="btn-eye">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="error-box" id="error-box">
        <i class="fa-solid fa-circle-exclamation"></i>&nbsp;
        <span id="error-msg"></span>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span id="btn-text">Iniciar Sesión</span>
        <span id="btn-spin" style="display:none">
          <i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Verificando...
        </span>
      </button>

    </form>

    <div class="login-foot">
      <p>Hospital Santa Margarita &copy; 2026</p>
      <p style="margin-top:3px">Certificado ISO 9001:2015</p>
    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirigir si ya está autenticado
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html'
    })

    // Toggle password
    document.getElementById('btn-eye').addEventListener('click', () => {
      const input = document.getElementById('password')
      const icon  = document.querySelector('#btn-eye i')
      if (input.type === 'password') {
        input.type = 'text';  icon.className = 'fa-solid fa-eye-slash'
      } else {
        input.type = 'password'; icon.className = 'fa-solid fa-eye'
      }
    })

    // Submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btnText = document.getElementById('btn-text')
      const btnSpin = document.getElementById('btn-spin')
      const btnEl   = document.getElementById('btn-login')
      const errorBox = document.getElementById('error-box')
      const errorMsg = document.getElementById('error-msg')

      btnText.style.display = 'none'
      btnSpin.style.display = 'inline'
      btnEl.disabled = true
      errorBox.style.display = 'none'

      try {
        await login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        )
        window.location.href = 'dashboard.html'
      } catch (err) {
        errorMsg.textContent = traducirError(err.message)
        errorBox.style.display = 'block'
        btnText.style.display = 'inline'
        btnSpin.style.display = 'none'
        btnEl.disabled = false
      }
    })

    function traducirError(msg) {
      if (msg.includes('Invalid login credentials')) return 'Correo o contraseña incorrectos.'
      if (msg.includes('Email not confirmed'))       return 'Confirma tu correo antes de ingresar.'
      if (msg.includes('Too many requests'))         return 'Demasiados intentos. Espera un momento.'
      return 'Error al iniciar sesión. Intenta de nuevo.'
    }
  </script>
</body>
</html>
