    .status{font-size:.857rem;color:#475569;margin:10px 0 18px;min-height:20px}

         line-height:1.6;margin-bottom:20px}

    .log .err {color:#f87171}
    .log .inf {color:#60a5fa}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;
         background:linear-gradient(135deg,#1a3554,#2563eb);color:#fff;
         font-size:.9rem;font-weight:600;border-radius:8px;cursor:pointer;
         box-shadow:0 2px 8px rgba(37,99,235,.35);transition:all .2s;border:none}
    .btn:hover:not(:disabled){transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .summary{display:flex;gap:16px;margin-top:18px}
    .sbox{flex:1;text-align:center;padding:14px;border-radius:8px}
    .sbox.ok {background:#f0fdf4;color:#15803d}
    .sbox.err{background:#fef2f2;color:#b91c1c}
    .sbox .n{font-size:2rem;font-weight:700}
    .sbox .l{font-size:.75rem;font-weight:600;text-transform:uppercase}
    .badge{display:inline-flex;align-items:center;gap:6px;font-size:.786rem;
           font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:20px}
    .badge.auth {background:#f0fdf4;color:#15803d}
    .badge.noauth{background:#fef2f2;color:#b91c1c}
  </style>

let nOk = 0, nErr = 0

// All columns beyond the guaranteed core — probed at runtime before insert
// Core (always exist): name, unit, measurement_frequency, is_active, created_by
const EXTRA_COLS = [
  'code','origin','description','formula',
  'limit_low_text','limit_mid_text','limit_high_text',
  'is_higher_better',
  'target_value','min_acceptable',
  'responsible_position','responsible_department_id'
]
let _availableCols = null  // detected at runtime

function log(msg, cls='') {
  const el = document.getElementById('log')
  el.innerHTML += '<span class="' + cls + '">' + msg + '</span>\n'
  el.scrollTop = el.scrollHeight
}

function setProgress(done, total) {
  document.getElementById('prog').style.width = ((done/total)*100) + '%'
  document.getElementById('status').textContent =
    done + ' de ' + total + ' procesados…'
}

// ── Detect which columns exist in the table via direct fetch to information_schema ──
async function detectSchema(session) {
  log('🔍 Verificando esquema de la tabla quality_indicators…', 'inf')

  // Try each extra column by selecting it with limit 0 — fastest way to check
  const present = []
  const missing = []

  for (const col of EXTRA_COLS) {
    const { error } = await db.from('quality_indicators').select(col).limit(0)
    if (error && error.message && error.message.includes('column')) {
      missing.push(col)
    } else {
      present.push(col)
    }
  }

  if (missing.length > 0) {
    log('⚠️  Columnas NO encontradas (falta migración): ' + missing.join(', '), 'err')
    log('', '')
    log('╔══════════════════════════════════════════════════════╗', 'err')
    log('║  Copia y ejecuta este SQL en Supabase SQL Editor:   ║', 'err')
    log('╚══════════════════════════════════════════════════════╝', 'err')
    log('', '')

    let sql = 'ALTER TABLE quality_indicators\n'
    const lines = missing.map(c => {
      if (c === 'is_higher_better') return "  ADD COLUMN IF NOT EXISTS is_higher_better BOOLEAN DEFAULT true"
      return `  ADD COLUMN IF NOT EXISTS ${c} TEXT`
    })
    sql += lines.join(',\n') + ';\nNOTIFY pgrst, \'reload schema\';'
    log(sql, 'err')
    log('', '')
    log('Después recarga esta página y vuelve a intentarlo.', 'err')
  } else {
    log('✅ Todas las columnas existen. Procediendo con importación completa.', 'ok')
  }

  log('   Columnas disponibles: ' + present.join(', '), 'inf')
  return present
}

async function startImport() {
  const btn = document.getElementById('btn-import')
  btn.disabled = true
  document.getElementById('log').innerHTML = ''
  document.getElementById('summary').style.display = 'none'
  nOk = 0; nErr = 0

  // Check auth
  const { data: { session } } = await db.auth.getSession()
  if (!session) { log('❌ No hay sesión activa. Por favor entra al SGC primero y regresa aquí.','err'); btn.disabled=false; return }
  log('✅ Sesión activa: ' + session.user.email, 'ok')

  // Detect schema
  _availableCols = await detectSchema(session)

  // Load departments
  log('', '')
  log('Cargando departamentos…','inf')
  const { data: depts } = await db.from('departments').select('id,name').eq('is_active',true).limit(200)
  const deptMap = {}
  if (depts) depts.forEach(d => { deptMap[d.name.trim().toLowerCase()] = d.id })
  log('  ' + Object.keys(deptMap).length + ' departamentos cargados.','inf')
  log('', '')

  const total = INDICADORES.length
  const BATCH  = 10

  for (let i = 0; i < total; i += BATCH) {
    const batch = INDICADORES.slice(i, i + BATCH).map(r => {
      const proc  = (r._process || '').trim().toLowerCase()
      const deptId = deptMap[proc] || null

      // Core payload — only columns that ALWAYS exist in any version of the table
      const row = {
        name:                  r.name,
        unit:                  r.unit,
        measurement_frequency: r.measurement_frequency,
        is_active:             r.is_active,
        created_by:            r.created_by
      }

      // Add optional columns only if detected in schema
      for (const col of _availableCols) {
        if (col === 'responsible_department_id') {
          row[col] = deptId
        } else if (r[col] !== undefined) {
          row[col] = r[col] ?? null
        }
      }

      return row
    })

    const { error } = await db.from('quality_indicators').insert(batch)
    if (error) {
      log('❌ Filas ' + (i+1) + '–' + Math.min(i+BATCH,total) + ': ' + error.message, 'err')
      nErr += batch.length
    } else {
      const firstCode = batch[0].code || ('#' + (i+1))
      const lastCode  = batch[batch.length-1].code || ('#' + Math.min(i+BATCH,total))
      log('✅ ' + firstCode + ' → ' + lastCode + ' (' + batch.length + ' registros)', 'ok')
      nOk += batch.length
    }
    setProgress(Math.min(i + BATCH, total), total)
    await new Promise(res => setTimeout(res, 150))
  }

  setProgress(total, total)
  document.getElementById('status').textContent = '¡Importación terminada!'
  document.getElementById('n-ok').textContent  = nOk
  document.getElementById('n-err').textContent = nErr
  document.getElementById('summary').style.display = 'flex'
  log('', '')
  log('══════════════════════════════════', 'inf')
  log('Resultado: ' + nOk + ' importados, ' + nErr + ' errores', nErr > 0 ? 'err' : 'ok')

  if (nOk > 0 && nErr === 0) {
    log('', '')
    log('🎉 Importación exitosa. Ahora ve a Indicadores en el SGC.', 'ok')
  }
  if (nOk > 0 && _availableCols.length < EXTRA_COLS.length) {
    log('', '')
    const missing = EXTRA_COLS.filter(c => !_availableCols.includes(c))
    log('⚠️  Se importaron ' + nOk + ' registros SIN los campos: ' + missing.join(', '), 'err')
    log('   Agrega las columnas faltantes y usa la opción "Actualizar campos extra" más adelante.', 'err')
  }

  btn.disabled = false
  btn.textContent = '🔄 Volver a intentar'
}

  const el = document.getElementById('auth-status')

    el.className = 'badge auth'
    el.textContent = '✅ Sesión activa: ' + session.user.email
    document.getElementById('btn-import').disabled = false
    document.getElementById('status').textContent = 'Sesión detectada. Listo para importar.'
  } else {
    el.className = 'badge noauth'
    el.textContent = '❌ Sin sesión — Entra primero al SGC en otra pestaña'
  }
})()
